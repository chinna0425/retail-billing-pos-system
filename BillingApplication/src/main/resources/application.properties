spring.application.name=BillingApplication

cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
server.port=${PORT:8080}

admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

spring.data.show-sql=true
spring.servlet.multipart.enabled=true

razorpay.key.id=${RAZORPAY_KEY}
razorpay.key.secret=${RAZORPAY_SECRET}

logging.level.org.springframework.security=DEBUG
spring.jackson.deserialization.fail-on-unknown-properties=true